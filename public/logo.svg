<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="cc">
      <circle cx="50" cy="50" r="45.5"/>
    </clipPath>
    <clipPath id="ic">
      <circle cx="50" cy="50" r="16"/>
    </clipPath>

    <!--
      Diagonal gold-stripe pattern.
      patternUnits="userSpaceOnUse" + rotate around center (50,50)
      gives consistent stripe direction across all five sections.
    -->
    <pattern id="dg"
      x="0" y="0" width="22" height="22"
      patternUnits="userSpaceOnUse"
      patternTransform="rotate(-42 50 50)">
      <rect width="22" height="22" fill="#1C1C1C"/>
      <rect y="0"  width="22" height="5.5" fill="#C9A84C"/>
    </pattern>

    <!-- Upper-right section: dark hexagon-ish (no stripe) -->
    <pattern id="dh"
      x="0" y="0" width="10" height="11.5"
      patternUnits="userSpaceOnUse">
      <rect width="10" height="11.5" fill="#202020"/>
      <circle cx="5" cy="2.9"  r="3.8" fill="none" stroke="#2c2c2c" stroke-width="0.9"/>
      <circle cx="0" cy="8.6"  r="3.8" fill="none" stroke="#2c2c2c" stroke-width="0.9"/>
      <circle cx="10" cy="8.6" r="3.8" fill="none" stroke="#2c2c2c" stroke-width="0.9"/>
    </pattern>

    <!-- Smaller diagonal-gold for inner circle -->
    <pattern id="dgs"
      x="0" y="0" width="14" height="14"
      patternUnits="userSpaceOnUse"
      patternTransform="rotate(-42 50 50)">
      <rect width="14" height="14" fill="#1C1C1C"/>
      <rect y="0" width="14" height="4" fill="#C9A84C"/>
    </pattern>

    <!-- Clip each outer section so diagonal lines don't bleed -->
    <clipPath id="s0">
      <path d="M 50,50 L 6.74,35.95  A 45.5,45.5 0 0 1 50,4.5    Z"/>
    </clipPath>
    <clipPath id="s1">
      <path d="M 50,50 L 50,4.5     A 45.5,45.5 0 0 1 93.26,35.95 Z"/>
    </clipPath>
    <clipPath id="s2">
      <path d="M 50,50 L 93.26,35.95 A 45.5,45.5 0 0 1 76.75,86.75 Z"/>
    </clipPath>
    <clipPath id="s3">
      <path d="M 50,50 L 76.75,86.75 A 45.5,45.5 0 0 1 23.25,86.75 Z"/>
    </clipPath>
    <clipPath id="s4">
      <path d="M 50,50 L 23.25,86.75 A 45.5,45.5 0 0 1 6.74,35.95  Z"/>
    </clipPath>
  </defs>

  <!-- Clip everything to outer circle -->
  <g clip-path="url(#cc)">

    <!-- White/off-white base (star area will sit on this) -->
    <rect width="100" height="100" fill="#EFEFEF"/>

    <!-- ── 5 SECTIONS ─────────────────────────────────── -->

    <!-- UPPER-LEFT  · diagonal gold -->
    <g clip-path="url(#s0)">
      <rect width="100" height="100" fill="url(#dg)"/>
    </g>

    <!-- UPPER-RIGHT · honeycomb dark + one angled gold stripe -->
    <g clip-path="url(#s1)">
      <rect width="100" height="100" fill="url(#dh)"/>
      <!-- Single gold diagonal accent -->
      <line x1="55" y1="4"  x2="96" y2="32"
            stroke="#C9A84C" stroke-width="4.5" stroke-linecap="round"/>
    </g>

    <!-- RIGHT       · diagonal gold -->
    <g clip-path="url(#s2)">
      <rect width="100" height="100" fill="url(#dg)"/>
    </g>

    <!-- BOTTOM      · diagonal gold -->
    <g clip-path="url(#s3)">
      <rect width="100" height="100" fill="url(#dg)"/>
    </g>

    <!-- LEFT        · diagonal gold -->
    <g clip-path="url(#s4)">
      <rect width="100" height="100" fill="url(#dg)"/>
    </g>

    <!-- ── WHITE STAR ────────────────────────────────────
         Outer points r=45.5, inner notch r=17.3
         P0 top      (50,    4.5 )
         P1 ur       (93.26, 35.95)
         P2 lr       (76.75, 86.75)
         P3 ll       (23.25, 86.75)
         P4 ul       (6.74,  35.95)
         IP01 -54°   (60.19, 35.71)
         IP12  18°   (66.45, 55.35)
         IP23  90°   (50,    67.3 )
         IP34 162°   (33.55, 55.35)
         IP40 234°   (39.81, 35.71)
    -->
    <path
      d="M 50,4.5
         L 60.19,35.71
         L 93.26,35.95
         L 66.45,55.35
         L 76.75,86.75
         L 50,67.3
         L 23.25,86.75
         L 33.55,55.35
         L 6.74,35.95
         L 39.81,35.71 Z"
      fill="#F2F2F2"
      stroke="#111111"
      stroke-width="1.9"
      stroke-linejoin="round"
    />

    <!-- ── INNER CIRCLE ──────────────────────────────── -->
    <g clip-path="url(#ic)">
      <rect width="100" height="100" fill="#EFEFEF"/>
      <!-- Same 5 sections, scaled to r=16 -->
      <!-- BLUE→DARK (upper-left)  -->
      <path d="M 50,50 L 34.78,45.06 A 16,16 0 0 1 50,34    Z" fill="url(#dgs)"/>
      <!-- RED→HEX  (upper-right) -->
      <path d="M 50,50 L 50,34       A 16,16 0 0 1 65.22,45.06 Z" fill="url(#dh)"/>
      <!-- GREEN→DG (right)        -->
      <path d="M 50,50 L 65.22,45.06 A 16,16 0 0 1 59.4,62.94  Z" fill="url(#dgs)"/>
      <!-- PURPLE→DG (bottom)      -->
      <path d="M 50,50 L 59.4,62.94  A 16,16 0 0 1 40.6,62.94  Z" fill="url(#dgs)"/>
      <!-- YELLOW→DG (left)        -->
      <path d="M 50,50 L 40.6,62.94  A 16,16 0 0 1 34.78,45.06 Z" fill="url(#dgs)"/>
    </g>
    <circle cx="50" cy="50" r="16"
            fill="none" stroke="#111111" stroke-width="1.7"/>

    <!-- Inner star outline -->
    <path
      d="M 50,38
         L 52.76,46.2
         L 61.41,46.42
         L 54.76,51.72
         L 57.27,60.06
         L 50,55.2
         L 42.73,60.06
         L 45.24,51.72
         L 38.59,46.42
         L 47.24,46.2 Z"
      fill="#EFEFEF"
      stroke="#666"
      stroke-width="0.75"
    />

  </g>

  <!-- Outer circle border (painted last, always sharp) -->
  <circle cx="50" cy="50" r="45.5"
          fill="none" stroke="#0D0D0D" stroke-width="5.5"/>
</svg>
